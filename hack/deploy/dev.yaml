apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  name: bke-controller-manager
  namespace: cluster-system
spec:
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/provider: infrastructure-bke
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        cluster.x-k8s.io/provider: infrastructure-bke
        control-plane: controller-manager
    spec:
      initContainers:
        - name: manifests
          image: deploy.bocloud.k8s:443/kubernetes/addons:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - cp -r . /manifests
          volumeMounts:
            - mountPath: /manifests
              name: manifests
      containers:
      - command:
        - /manager
        env:
        - name: container
          value: "true"
        - name: DEBUG
          value: "true"
        image: deploy.bocloud.k8s:443/kubernetes/bke-controller:v1.0.0
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: true
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        - mountPath: /var/log
          name: log
        - mountPath: /etc/localtime
          name: localtime
        - mountPath: /manifests
          name: manifests
      securityContext:
        runAsNonRoot: false
      serviceAccountName: bke-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: bke-webhook-secret
      - hostPath:
          path: /var/log
          type: Directory
        name: log
      - hostPath:
          path: /etc/localtime
        name: localtime
      - emptyDir: {}
        name: manifests
---
