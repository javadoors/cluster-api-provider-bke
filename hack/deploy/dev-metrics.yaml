apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  name: bke-controller-manager-metrics-monitor
  namespace: cluster-system
spec:
  endpoints:
    - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      path: /metrics
      port: metrics
      interval: 5s
  selector:
    matchLabels:
      control-plane: controller-manager
---
apiVersion: v1
kind: Service
metadata:
  labels:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  name: bke-controller-manager-metrics-service
  namespace: cluster-system
spec:
  ports:
    - name: metrics
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  labels:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  name: bke-controller-manager-metrics-service
  namespace: cluster-system
subsets:
  - addresses:
      - ip: 172.28.8.66  #change this
    ports:
      - name: metrics
        port: 8080
        protocol: TCP

