# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/bkeagent.bocloud.com_commands.yaml
- bases/bke.bocloud.com_bkemachines.yaml
- bases/bke.bocloud.com_bkemachinetemplates.yaml
- bases/bke.bocloud.com_bkeclusters.yaml
- bases/bke.bocloud.com_bkeclustertemplates.yaml
- bases/bke.bocloud.com_containerdconfigs.yaml
#+kubebuilder:scaffold:crdkustomizeresource

commonLabels:
  cluster.x-k8s.io/v1beta1: v1beta1

patchesStrategicMerge:
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix.
# patches here are for enabling the conversion webhook for each CRD
#- patches/webhook_in_bkemachines.yaml
#- patches/webhook_in_bkemachinetemplates.yaml
#- patches/webhook_in_bkeclusters.yaml
#- patches/webhook_in_bkeclustertemplates.yaml
#- patches/webhook_in_commands.yaml
#+kubebuilder:scaffold:crdkustomizewebhookpatch

# [CERTMANAGER] To enable cert-manager, uncomment all the sections with [CERTMANAGER] prefix.
# patches here are for enabling the CA injection for each CRD
#- patches/cainjection_in_bkemachines.yaml
#- patches/cainjection_in_bkemachinetemplates.yaml
#- patches/cainjection_in_bkeclusters.yaml
#- patches/cainjection_in_bkeclustertemplates.yaml
#- patches/cainjection_in_commands.yaml
#+kubebuilder:scaffold:crdkustomizecainjectionpatch

# the following config is for teaching kustomize how to do kustomization for CRDs.
configurations:
- kustomizeconfig.yaml
