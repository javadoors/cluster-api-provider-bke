---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: clusterversions.config.openfuyao.com
spec:
  group: config.openfuyao.com
  names:
    kind: ClusterVersion
    listKind: ClusterVersionList
    plural: clusterversions
    shortNames:
    - cv
    singular: clusterversion
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.desiredVersion
      name: Desired
      type: string
    - jsonPath: .status.currentVersion
      name: Current
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterVersion tracks desired and current openFuyao cluster version.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: ClusterVersionSpec defines the desired cluster version state.
            properties:
              desiredVersion:
                description: DesiredVersion is the target openFuyao version for the cluster.
                type: string
            type: object
          status:
            description: ClusterVersionStatus defines the observed cluster version state.
            properties:
              conditions:
                items:
                  description: ClusterVersionCondition reports fine-grained readiness.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
              currentVersion:
                type: string
              phase:
                description: ClusterVersionPhase is the lifecycle phase of a ClusterVersion.
                enum:
                - Pending
                - Installing
                - Installed
                - Ready
                - PreChecking
                - Upgrading
                - Upgraded
                - Blocked
                - PreCheckFailed
                - Failed
                type: string
              upgradeHistory:
                items:
                  description: ClusterUpgradeRecord records one upgrade attempt.
                  properties:
                    completedAt:
                      format: date-time
                      type: string
                    from:
                      type: string
                    startedAt:
                      format: date-time
                      type: string
                    status:
                      description: ClusterUpgradeRecordStatus is the result of an upgrade record.
                      enum:
                      - Succeeded
                      - Failed
                      - RolledBack
                      type: string
                    to:
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
