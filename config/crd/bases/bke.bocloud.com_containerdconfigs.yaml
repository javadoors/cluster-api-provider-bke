                        - inherit
                        - "null"
                        - tty
                        - journal
                        - syslog
                        - kmsg
                        - journal+console
                        - syslog+console
                        - kmsg+console
                        type: string
                      syslogIdentifier:
                        description: SyslogIdentifier specifies the syslog identifier
                        type: string
                    type: object
