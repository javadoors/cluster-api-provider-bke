---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: upgradepaths.config.openfuyao.com
spec:
  group: config.openfuyao.com
  names:
    kind: UpgradePath
    listKind: UpgradePathList
    plural: upgradepaths
    shortNames:
    - up
    singular: upgradepath
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.pathCount
      name: Paths
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: UpgradePath defines allowed version upgrade routes loaded from
          an OCI artifact.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UpgradePathSpec defines the desired upgrade path catalog.
            properties:
              paths:
                items:
                  description: UpgradePathRule is one directed upgrade edge between
                    versions.
                  properties:
                    blocked:
                      type: boolean
                    deprecated:
                      type: boolean
                    from:
                      type: string
                    notes:
                      type: string
                    postCheck:
                      items:
                        description: CheckStep describes a upgrade validation step.
                        properties:
                          name:
                            type: string
                          required:
                            type: boolean
                        type: object
                      type: array
                    preCheck:
                      items:
                        description: CheckStep describes a upgrade validation step.
                        properties:
                          name:
                            type: string
                          required:
                            type: boolean
                        type: object
                      type: array
                    to:
                      type: string
                  type: object
                type: array
              versions:
                items:
                  description: VersionEntry defines version info.
                  properties:
                    deprecated:
                      type: boolean
                    installable:
                      type: boolean
                    notes:
                      type: string
                    version:
                      type: string
                  type: object
                type: array
            type: object
          status:
            description: UpgradePathStatus defines the observed upgrade path catalog
              state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastCheckedAt:
                format: date-time
                type: string
              lastDigest:
                type: string
              pathCount:
                type: integer
              phase:
                description: UpgradePathPhase is the validation/lifecycle phase of
                  an UpgradePath.
                enum:
                - Active
                - Blocked
                - Invalid
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
