# permissions for end users to edit bkeclustertemplates.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bkeclustertemplate-editor-role
rules:
- apiGroups:
  - bke.bocloud.com
  resources:
  - bkeclustertemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bke.bocloud.com
  resources:
  - bkeclustertemplates/status
  verbs:
  - get
