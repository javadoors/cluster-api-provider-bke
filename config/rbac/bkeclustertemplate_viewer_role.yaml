# permissions for end users to view bkeclustertemplates.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bkeclustertemplate-viewer-role
rules:
- apiGroups:
  - bke.bocloud.com
  resources:
  - bkeclustertemplates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - bke.bocloud.com
  resources:
  - bkeclustertemplates/status
  verbs:
  - get
